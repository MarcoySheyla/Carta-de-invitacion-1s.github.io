<!DOCTYPE html>
<html lang="es">
<head>

  <link rel="stylesheet" href="pagina2.css">

</head>

<body>

  <!-- AUDIO -->
  <audio id="music" loop>

  <section class="hero">

    <div class="hero-bg"></div>

    <!-- CAPA 3: OVERLAY -->
    <div class="hero-overlay"></div>

    <!-- CAPA 4: CONTENIDO -->
    <div class="contenido-boda">
      <p class="pre">NOS CASAMOS</p>

      <h1 class="nombres">
        <span class="nombre">Marco</span>
        <span class="amp">&</span>
        <span class="nombre">Sheyla</span>
      </h1>

      <p class="fecha">01 de Agosto de 2026</p>
      <p class="confirmar">CONFIRMA TU ASISTENCIA</p>
    </div>

    <div class="scroll-indicator">⌄</div>

  </section>

  <script src="script.js"></script>

</html>
